services:
  - type: web
    name: flip-scout
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
    envVars:
      - key: RENTCAST_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
